name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test (macOS)
    runs-on: macos-15
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Swift version
        run: swift --version

      - name: Cache SwiftPM dependencies
        uses: actions/cache@v4
        with:
          path: .build
          key: ${{ runner.os }}-spm-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Build (debug)
        run: swift build -v

      - name: Run tests
        run: swift test -v

      - name: Build release binaries (host arch)
        run: swift build -c release

  lint-shell-scripts:
    name: Shellcheck installer & packaging scripts
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Shellcheck
        run: |
          shellcheck -S warning install.sh
          shellcheck -S warning Scripts/*.sh

  build-app-bundle:
    name: Build .app bundle (smoke test)
    runs-on: macos-15
    needs: build-and-test
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app
      - name: Build app bundle (host arch only, unsigned)
        env:
          SKIP_UNIVERSAL: "1"
          CODESIGN_IDENTITY: "-"
        run: ./Scripts/build-app.sh
      - name: Verify bundle structure
        run: |
          test -f "dist/rCodexPDF.app/Contents/MacOS/RCodexPDF"
          test -f "dist/rCodexPDF.app/Contents/Resources/AppIcon.icns"
          test -f "dist/rCodexPDF.app/Contents/Info.plist"
          test -x "dist/rCodexPDF.app/Contents/Resources/bin/rcodexpdf"
          echo "Bundle structure OK"
      - name: Smoke-test CLI
        timeout-minutes: 3
        run: |
          # Occasionally the very first exec of a freshly-built ad-hoc-signed binary on a clean
          # runner stalls (macOS first-launch code-signing/AMFI assessment) — self-heal with a
          # few short-timeout retries instead of burning the whole job on one hung attempt.
          CLI="dist/rCodexPDF.app/Contents/Resources/bin/rcodexpdf"

          run_with_timeout() {
            local secs="$1"; shift
            "$@" < /dev/null &
            local pid=$!
            ( sleep "$secs" && kill -9 "$pid" 2>/dev/null ) &
            local watcher=$!
            wait "$pid" 2>/dev/null
            local status=$?
            kill "$watcher" 2>/dev/null
            wait "$watcher" 2>/dev/null
            return $status
          }

          attempt_cli() {
            local tries=3
            for i in $(seq 1 $tries); do
              echo "Attempt $i/$tries: $*"
              if run_with_timeout 25 "$CLI" "$@"; then
                return 0
              fi
              echo "Attempt $i timed out or failed; retrying…"
            done
            return 1
          }

          attempt_cli --help
          attempt_cli --version
